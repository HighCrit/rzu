# This is a basic workflow to help you get started with Actions

name: main

# Controls when the workflow will run
# Triggers the workflow on push or pull request events
on: [ push, pull_request, workflow_dispatch ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # Linux build
  linux:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build cmake unixodbc-dev libsqliteodbc libssl-dev libreadline-dev gdb valgrind \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Check ARM toolchain
        run: |
          which aarch64-linux-gnu-g++
          aarch64-linux-gnu-g++ --version
          ls -l /usr/bin/aarch64*
 
      # Runs a set of commands using the runners shell
      - name: Build
        run: |
          ulimit -c unlimited
          sudo sh -c 'echo "core.%e.%p.%s.%t" > /proc/sys/kernel/core_pattern'
          # --- AMD64 build ---
          mkdir -p build/amd64
          cd build/amd64
          cmake ../.. -GNinja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_SHARED_LIBS=FALSE \
            -DRZU_BUILD_DIR_NAME=$GITHUB_WORKSPACE/build/bin/amd64
          cmake --build . --target package --config RelWithDebInfo
          cd ../..
 
          # --- ARM64 cross-build ---
          # cmake/toolchain-arm64.cmake is auto-generated by the amd64 configure
          # step above and committed into the source tree on first run.
          mkdir -p build/arm64
          cd build/arm64
          cmake ../.. -GNinja \
            --toolchain cmake/toolchain-arm64.cmake \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_SHARED_LIBS=FALSE \
            -DRZU_BUILD_DIR_NAME=$GITHUB_WORKSPACE/build/bin/arm64
          cmake --build . --target package --config RelWithDebInfo
          cd ../..
 
      - name: Test
        run: |
          # Tests run against AMD64 only
          cd build/amd64-bin
          set +e
          set -x
          LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/odbc valgrind --leak-check=full --trace-children=yes ctest -VV
          RESULT=$?
          for i in $(find ./ -maxdepth 1 -name 'core*' -print); do
            echo "Core $i" && file "$i" &&
            gdb "$(file "$i" | sed -r "s/.*from '([^ ']+)[ '].*/\1/")" "$i" -ex "thread apply all bt" -ex "set pagination 0" -batch
          done
          zip -r test_logs.zip core* log traffic_log
          exit $RESULT

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact name
          name: "rzu-linux" # optional, default is artifact
          # A file, directory or wildcard pattern that describes what to upload
          path: |
            build/amd64-bin/*.zip
            build/arm64-bin/*.zip
 
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          # Artifact name
          name: "test_logs_linux.zip" # optional, default is artifact
          # A file, directory or wildcard pattern that describes what to upload
          path: build/amd64-bin/test_logs.zip

  windows:
    # The type of runner that the job will run on
    runs-on: windows-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      
      - name: Install dependencies
        id: dependencies
        run: |
          $openssl_latest_url = "https://slproweb.com/download/Win64OpenSSL_Light-4_0_0.exe"
          $openssl_installer = "$env:TEMP\Win64OpenSSL_Light-4_0_0.exe"

          Write-Host "Downloading OpenSSL from $openssl_latest_url"

          (New-Object Net.WebClient).DownloadFile(
              $openssl_latest_url,
              $openssl_installer
          )

          Start-Process $openssl_installer `
              -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" `
              -Wait

          Write-Host "Done installing OpenSSL"

      # Runs a set of commands using the runners shell
      - name: Build
        run: |
          mkdir build
          cd build
          
          cmake .. -DBUILD_SHARED_LIBS=FALSE -DCMAKE_BUILD_TYPE=RelWithDebInfo
          if ($lastexitcode -ne 0) { exit $lastexitcode }
          
          cmake --build . --target package --config RelWithDebInfo --parallel
          if ($lastexitcode -ne 0) { exit $lastexitcode }
          
      - name: Test
        run: |
          cd build
          ctest -VV -C RelWithDebInfo
          $test_result = $lastexitcode
          
          echo "Compressing test logs"
          7z a test_logs.zip crashdump.dmp log traffic_log
          
          exit $test_result

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact name
          name: "rzu-windows" # optional, default is artifact
          # A file, directory or wildcard pattern that describes what to upload
          path: build/*.zip

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          # Artifact name
          name: "test_logs_windows.zip" # optional, default is artifact
          # A file, directory or wildcard pattern that describes what to upload
          path: build/test_logs.zip
  release:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    needs:
      - linux
      - windows

    steps:
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: 'build/rzemu*-rz*.zip'
