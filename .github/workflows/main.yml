# This is a basic workflow to help you get started with Actions

name: main

# Controls when the workflow will run
# Triggers the workflow on push or pull request events
on: [ push, pull_request, workflow_dispatch ]

jobs:

  # ---------------------------------------------------------------------------
  # Builds
  # ---------------------------------------------------------------------------

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive


      - name: Install amd64 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            unixodbc-dev \
            libsqliteodbc \
            libssl-dev \
            libreadline-dev \
            gdb \
            valgrind

      - name: Cache CMake build (amd64)
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-amd64-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}-${{ github.sha }}
          restore-keys: |
            cmake-amd64-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}-
            cmake-amd64-${{ runner.os }}-

      - name: Build (amd64)
        run: |
          ulimit -c unlimited
          sudo sh -c 'echo "core.%e.%p.%s.%t" > /proc/sys/kernel/core_pattern'
          mkdir -p build/amd64
          cd build/amd64
          cmake ../.. -GNinja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_SHARED_LIBS=FALSE \
            -DRZU_BUILD_DIR_NAME=$GITHUB_WORKSPACE/build/amd64-bin
          cmake --build . --target package --config RelWithDebInfo

      - name: Upload amd64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: rzu-linux-amd64
          path: build/amd64-bin/*.zip

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive


      - name: Install arm64 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            unixodbc-dev \
            libsqliteodbc \
            libssl-dev \
            libreadline-dev \
            gdb \
            valgrind

      - name: Cache CMake build (arm64)
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-arm64-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}-${{ github.sha }}
          restore-keys: |
            cmake-arm64-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}-
            cmake-arm64-${{ runner.os }}-${{ runner.arch }}-

      - name: Build (arm64)
        run: |
          mkdir -p build/arm64
          cd build/arm64
          cmake ../.. -GNinja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_SHARED_LIBS=FALSE \
            -DRZU_BUILD_DIR_NAME=$GITHUB_WORKSPACE/build/arm64-bin
          cmake --build . --target package --config RelWithDebInfo

      - name: Upload arm64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: rzu-linux-arm64
          path: build/arm64-bin/*.zip

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache OpenSSL installer
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\Win64OpenSSL_Light-4_0_0.exe
          key: openssl-win64-4_0_0

      - name: Download OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          (New-Object Net.WebClient).DownloadFile(
            "https://slproweb.com/download/Win64OpenSSL_Light-4_0_0.exe",
            "$env:RUNNER_TEMP\Win64OpenSSL_Light-4_0_0.exe"
          )

      - name: Install OpenSSL
        run: |
          Start-Process "$env:RUNNER_TEMP\Win64OpenSSL_Light-4_0_0.exe" `
            -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" `
            -Wait
          Write-Host "Done installing OpenSSL"

      - name: Cache SQLite ODBC installer
        id: cache-sqliteodbc
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\sqliteodbc_w64.exe
          key: sqliteodbc-w64

      - name: Download SQLite ODBC Driver
        if: steps.cache-sqliteodbc.outputs.cache-hit != 'true'
        run: |
          (New-Object Net.WebClient).DownloadFile(
            "http://www.ch-werner.de/sqliteodbc/sqliteodbc_w64.exe",
            "$env:RUNNER_TEMP\sqliteodbc_w64.exe"
          )

      - name: Install SQLite ODBC Driver
        run: |
          Start-Process "$env:RUNNER_TEMP\sqliteodbc_w64.exe" -ArgumentList "/S" -Wait
          Write-Host "Done installing SQLite ODBC Driver x64"

      - name: Cache CMake build (windows)
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-windows-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}-${{ github.sha }}
          restore-keys: |
            cmake-windows-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}-
            cmake-windows-${{ runner.os }}-

      - name: Build (windows amd64)
        run: |
          mkdir build
          cd build
          cmake .. -DBUILD_SHARED_LIBS=FALSE -DCMAKE_BUILD_TYPE=RelWithDebInfo
          if ($lastexitcode -ne 0) { exit $lastexitcode }
          cmake --build . --target package --config RelWithDebInfo --parallel
          if ($lastexitcode -ne 0) { exit $lastexitcode }

      - name: Upload windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: rzu-windows-amd64
          path: build-bin/*.zip

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------

  test-linux-amd64:
    runs-on: ubuntu-latest
    needs: build-linux-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            unixodbc-dev \
            libsqliteodbc \
            libssl-dev \
            libreadline-dev \
            gdb \
            valgrind

      - name: Restore CMake build (amd64)
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-amd64-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}-${{ github.sha }}

      - name: Test (amd64)
        run: |
          ulimit -c unlimited
          sudo sh -c 'echo "core.%e.%p.%s.%t" > /proc/sys/kernel/core_pattern'
          cd build/amd64
          set +e
          set -x
          LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/odbc valgrind --leak-check=full --trace-children=yes ctest -VV
          RESULT=$?
          for i in $(find ./ -maxdepth 1 -name 'core*' -print); do
            echo "Core $i" && file "$i" &&
            gdb "$(file "$i" | sed -r "s/.*from '([^ ']+)[ '].*/\1/")" "$i" -ex "thread apply all bt" -ex "set pagination 0" -batch
          done
          zip -r test_logs.zip core* log traffic_log
          exit $RESULT

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_logs_linux_amd64
          path: build/test_logs.zip

  test-linux-arm64:
    runs-on: ubuntu-24.04-arm
    needs: build-linux-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            unixodbc-dev \
            libsqliteodbc \
            libssl-dev \
            libreadline-dev \
            gdb \
            valgrind

      - name: Restore CMake build (arm64)
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-arm64-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}-${{ github.sha }}

      - name: Test (arm64)
        run: |
          cd build/arm64
          set +e
          set -x
          LD_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu/odbc valgrind --leak-check=full --trace-children=yes ctest -VV
          RESULT=$?
          for i in $(find ./ -maxdepth 1 -name 'core*' -print); do
            echo "Core $i" && file "$i" &&
            gdb "$(file "$i" | sed -r "s/.*from '([^ ']+)[ '].*/\1/")" "$i" -ex "thread apply all bt" -ex "set pagination 0" -batch
          done
          zip -r test_logs.zip core* log traffic_log
          exit $RESULT

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_logs_linux_arm64
          path: build/test_logs.zip

  test-windows-amd64:
    runs-on: windows-latest
    needs: build-windows-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install SQLite ODBC Driver
        run: |
          $sqliteInstaller = "$env:RUNNER_TEMP\sqliteodbc_w64.exe"
          (New-Object Net.WebClient).DownloadFile(
            "http://www.ch-werner.de/sqliteodbc/sqliteodbc_w64.exe",
            $sqliteInstaller
          )
          Start-Process $sqliteInstaller -ArgumentList "/S" -Wait

      - name: Restore CMake build (windows)
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-windows-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}-${{ github.sha }}

      - name: Test (windows amd64)
        run: |
          cd build
          ctest -VV -C RelWithDebInfo
          $test_result = $lastexitcode
          echo "Compressing test logs"
          7z a test_logs.zip crashdump.dmp log traffic_log
          exit $test_result

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_logs_windows_amd64
          path: build/test_logs.zip

  # ---------------------------------------------------------------------------
  # Publish (tags only)
  # ---------------------------------------------------------------------------

  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - test-linux-amd64
      - test-linux-arm64
      - test-windows-amd64
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
