name: main

on: [ push, pull_request, workflow_dispatch ]

jobs:

  # ---------------------------------------------------------------------------
  # Builds
  # ---------------------------------------------------------------------------

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install amd64 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            unixodbc-dev \
            libsqliteodbc \
            libssl-dev \
            libreadline-dev \
            gdb \
            valgrind

      - name: Build (amd64)
        run: |
          ulimit -c unlimited
          sudo sh -c 'echo "core.%e.%p.%s.%t" > /proc/sys/kernel/core_pattern'
          mkdir -p build
          cd build
          cmake .. -GNinja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_SHARED_LIBS=FALSE
          cmake --build . --target package --config RelWithDebInfo

      - name: Upload amd64 build tree
        uses: actions/upload-artifact@v7
        with:
          name: build-tree-linux-amd64
          path: |
            build/
            build-bin/

      - name: Upload amd64 packages
        uses: actions/upload-artifact@v7
        with:
          name: rzu-linux-amd64
          path: build/*.zip

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install arm64 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            unixodbc-dev \
            libsqliteodbc \
            libssl-dev \
            libreadline-dev \
            gdb \
            valgrind

      - name: Build (arm64)
        run: |
          mkdir -p build
          cd build
          cmake .. -GNinja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_SHARED_LIBS=FALSE
          cmake --build . --target package --config RelWithDebInfo

      - name: Upload arm64 build tree
        uses: actions/upload-artifact@v7
        with:
          name: build-tree-linux-arm64
          path: |
            build/
            build-bin/

      - name: Upload arm64 packages
        uses: actions/upload-artifact@v7
        with:
          name: rzu-linux-arm64
          path: build/*.zip

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Cache OpenSSL installer
        id: cache-openssl
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\Win64OpenSSL_Light-4_0_0.exe
          key: openssl-win64-4_0_0

      - name: Download OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          (New-Object Net.WebClient).DownloadFile(
            "https://slproweb.com/download/Win64OpenSSL_Light-4_0_0.exe",
            "$env:RUNNER_TEMP\Win64OpenSSL_Light-4_0_0.exe"
          )

      - name: Install OpenSSL
        run: |
          Start-Process "$env:RUNNER_TEMP\Win64OpenSSL_Light-4_0_0.exe" `
            -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" `
            -Wait
          Write-Host "Done installing OpenSSL"

      - name: Cache SQLite ODBC installer
        id: cache-sqliteodbc
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\sqliteodbc_w64.exe
          key: sqliteodbc-w64

      - name: Download SQLite ODBC Driver
        if: steps.cache-sqliteodbc.outputs.cache-hit != 'true'
        run: |
          (New-Object Net.WebClient).DownloadFile(
            "http://www.ch-werner.de/sqliteodbc/sqliteodbc_w64.exe",
            "$env:RUNNER_TEMP\sqliteodbc_w64.exe"
          )

      - name: Install SQLite ODBC Driver
        run: |
          Start-Process "$env:RUNNER_TEMP\sqliteodbc_w64.exe" -ArgumentList "/S" -Wait
          Write-Host "Done installing SQLite ODBC Driver x64"

      - name: Build (windows amd64)
        run: |
          mkdir build
          cd build
          cmake .. -DBUILD_SHARED_LIBS=FALSE -DCMAKE_BUILD_TYPE=RelWithDebInfo
          if ($lastexitcode -ne 0) { exit $lastexitcode }
          cmake --build . --target package --config RelWithDebInfo --parallel
          if ($lastexitcode -ne 0) { exit $lastexitcode }

      - name: Upload windows build tree
        uses: actions/upload-artifact@v7
        with:
          name: build-tree-windows-amd64
          path: |
            build/
            build-bin/

      - name: Upload windows packages
        uses: actions/upload-artifact@v7
        with:
          name: rzu-windows-amd64
          path: build/*.zip

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------

  test-linux-amd64:
    runs-on: ubuntu-latest
    needs: build-linux-amd64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            unixodbc-dev \
            libsqliteodbc \
            libssl-dev \
            libreadline-dev \
            gdb \
            valgrind

      - name: Download amd64 build tree
        uses: actions/download-artifact@v8
        with:
          name: build-tree-linux-amd64
          path: .

      - name: Restore binary permissions
        run: chmod -R +x build-bin/

      - name: Test (amd64)
        run: |
          ulimit -c unlimited
          sudo sh -c 'echo "core.%e.%p.%s.%t" > /proc/sys/kernel/core_pattern'
          cd build
          set +e
          set -x
          LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/odbc valgrind --leak-check=full --trace-children=yes ctest -VV
          RESULT=$?
          for i in $(find ./ -maxdepth 1 -name 'core*' -print); do
            echo "Core $i" && file "$i" &&
            gdb "$(file "$i" | sed -r "s/.*from '([^ ']+)[ '].*/\1/")" "$i" -ex "thread apply all bt" -ex "set pagination 0" -batch
          done
          zip -r test_logs.zip core* log traffic_log
          exit $RESULT

      - name: Upload test logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test_logs_linux_amd64
          path: build/test_logs.zip


  test-windows-amd64:
    runs-on: windows-latest
    needs: build-windows-amd64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
 
      - name: Install SQLite ODBC Driver
        run: |
          $exePath = "$($env:TEMP)\sqliteodbc_w64.exe"
          (New-Object Net.WebClient).DownloadFile('http://www.ch-werner.de/sqliteodbc/sqliteodbc_w64.exe', $exePath)
          cmd /c start /wait $exePath /S
          Write-Host "Done installing SQLite ODBC Driver x64"
 
      - name: Download windows build tree
        uses: actions/download-artifact@v8
        with:
          name: build-tree-windows-amd64
          path: .
 
      - name: Test (windows amd64)
        run: |
          cd build
          # Get the full list of test names, shuffle them, and pick ~1/3.
          $tests = (ctest -N -C RelWithDebInfo | Select-String "Test #\d+:" | ForEach-Object { ($_ -replace '.*Test #\d+: (.+)', '$1').Trim() })
          $shuffled = $tests | Sort-Object { Get-Random }
          $subset = $shuffled | Select-Object -First ([math]::Max(1, [math]::Ceiling($shuffled.Count / 3)))
          $pattern = ($subset -join "|")
          Write-Host "Running $($subset.Count) of $($tests.Count) tests"
          ctest -VV -C RelWithDebInfo --schedule-random -R $pattern
          $test_result = $lastexitcode
          echo "Compressing test logs"
          7z a test_logs.zip crashdump.dmp log traffic_log
          exit $test_result
 
      - name: Upload test logs
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test_logs_windows_amd64
          path: build/test_logs.zip

  # ---------------------------------------------------------------------------
  # Publish (tags only)
  # ---------------------------------------------------------------------------

  publish-release-amd64:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test-linux-amd64]
    permissions:
      contents: write
    steps:
      - name: Download amd64 packages
        uses: actions/download-artifact@v8
        with:
          name: rzu-linux-amd64
          path: artifacts
      - name: Publish amd64 binaries
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release-arm64:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux-arm64]
    permissions:
      contents: write
    steps:
      - name: Download arm64 packages
        uses: actions/download-artifact@v8
        with:
          name: rzu-linux-arm64
          path: artifacts
      - name: Publish arm64 binaries
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release-windows:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test-windows-amd64]
    permissions:
      contents: write
    steps:
      - name: Download windows packages
        uses: actions/download-artifact@v8
        with:
          name: rzu-windows-amd64
          path: artifacts
      - name: Publish windows binaries
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - publish-release-amd64
      - publish-release-arm64
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: rzauth
          - image: rzgamereconnect
          - image: rzlog
    steps:
      - uses: actions/checkout@v6
 
      # Download the amd64 and arm64 build trees so we have the zips and
      # librzu.so for both architectures.
      - name: Download amd64 build tree
        uses: actions/download-artifact@v8
        with:
          name: build-tree-linux-amd64
          path: build-tree-amd64
 
      - name: Download arm64 build tree
        uses: actions/download-artifact@v8
        with:
          name: build-tree-linux-arm64
          path: build-tree-arm64
 
      # Extract the zip for each arch into a staging directory so the
      # Dockerfile COPY instructions are arch-agnostic.
      - name: Stage amd64 files
        run: |
          mkdir -p stage/amd64
          ZIP=$(find build-tree-amd64/build/ -name "rzemu-*-Linux-*-${{ matrix.image }}.zip" | head -1)
          echo "Using zip: $ZIP"
          unzip -o "$ZIP" -d stage/amd64/
          cp build-tree-amd64/build-bin/librzu.so stage/amd64/
 
      - name: Stage arm64 files
        run: |
          mkdir -p stage/arm64
          ZIP=$(find build-tree-arm64/build/ -name "rzemu-*-Linux-*-${{ matrix.image }}.zip" | head -1)
          echo "Using zip: $ZIP"
          unzip -o "$ZIP" -d stage/arm64/
          cp build-tree-arm64/build-bin/librzu.so stage/arm64/
 
      # Write a Dockerfile tuned for each image. We use a build arg to select
      # the staged directory so a single Dockerfile serves both architectures
      # when built with docker buildx.
      - name: Write Dockerfile
        run: |
          cat > Dockerfile.${{ matrix.image }} << 'DOCKERFILE'
          FROM ubuntu:24.04
          RUN apt-get update && \
              apt-get install -y --no-install-recommends \
                  libstdc++6 \
                  libssl3 \
                  unixodbc \
                  odbc-postgresql \
              && rm -rf /var/lib/apt/lists/*
          ARG STAGED_DIR
          COPY ${STAGED_DIR}/librzu.so /usr/lib/librzu.so
          COPY ${STAGED_DIR}/ /opt/${{ matrix.image }}/
          RUN chmod +x /opt/${{ matrix.image }}/${{ matrix.image }}
          WORKDIR /opt/${{ matrix.image }}
          ENTRYPOINT ["/opt/${{ matrix.image }}/${{ matrix.image }}"]
          DOCKERFILE
 
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
 
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Compute lowercase image name
        id: image_name
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
 
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ steps.image_name.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
 
      - name: Build and push amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.${{ matrix.image }}
          platforms: linux/amd64
          build-args: STAGED_DIR=stage/amd64
          push: true
          tags: ghcr.io/${{ steps.image_name.outputs.owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}-amd64
          labels: ${{ steps.meta.outputs.labels }}
 
      - name: Build and push arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.${{ matrix.image }}
          platforms: linux/arm64
          build-args: STAGED_DIR=stage/arm64
          push: true
          tags: ghcr.io/${{ steps.image_name.outputs.owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}-arm64
          labels: ${{ steps.meta.outputs.labels }}
 
      # Combine the two single-arch images into multi-arch manifests for every
      # tag that metadata-action produced (e.g. 6.5.3, 6.5, latest).
      - name: Create and push multi-arch manifests
        run: |
          IMAGE="ghcr.io/${{ steps.image_name.outputs.owner }}/${{ matrix.image }}"
          VERSION="${{ steps.meta.outputs.version }}"
          AMD64="${IMAGE}:${VERSION}-amd64"
          ARM64="${IMAGE}:${VERSION}-arm64"
          # Iterate over every tag produced by metadata-action and create a
          # multi-arch manifest pointing at the two arch-specific images.
          echo "${{ steps.meta.outputs.tags }}" | while read -r TAG; do
            echo "Creating manifest for $TAG"
            docker buildx imagetools create -t "$TAG" "$AMD64" "$ARM64"
          done
