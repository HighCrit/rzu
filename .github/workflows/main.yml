name: main

on: [ push, pull_request, workflow_dispatch ]

jobs:

  # ---------------------------------------------------------------------------
  # Builds
  # ---------------------------------------------------------------------------

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install amd64 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            unixodbc-dev \
            libsqliteodbc \
            libssl-dev \
            libreadline-dev \
            gdb \
            valgrind

      - name: Build (amd64)
        run: |
          ulimit -c unlimited
          sudo sh -c 'echo "core.%e.%p.%s.%t" > /proc/sys/kernel/core_pattern'
          mkdir -p build
          cd build
          cmake .. -GNinja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_SHARED_LIBS=FALSE
          cmake --build . --target package --config RelWithDebInfo

      - name: Upload amd64 build tree
        uses: actions/upload-artifact@v4
        with:
          name: build-tree-linux-amd64
          path: |
            build/
            build-bin/

      - name: Upload amd64 packages
        uses: actions/upload-artifact@v4
        with:
          name: rzu-linux-amd64
          path: build/*.zip

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install arm64 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            unixodbc-dev \
            libsqliteodbc \
            libssl-dev \
            libreadline-dev \
            gdb \
            valgrind

      - name: Build (arm64)
        run: |
          mkdir -p build
          cd build
          cmake .. -GNinja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_SHARED_LIBS=FALSE
          cmake --build . --target package --config RelWithDebInfo

      - name: Upload arm64 build tree
        uses: actions/upload-artifact@v4
        with:
          name: build-tree-linux-arm64
          path: |
            build/
            build-bin/

      - name: Upload arm64 packages
        uses: actions/upload-artifact@v4
        with:
          name: rzu-linux-arm64
          path: build/*.zip

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          $openssl_download_page = Invoke-WebRequest "http://slproweb.com/products/Win32OpenSSL.html"
          $openssl_download_link = Select-String -Pattern '<a href="/download/(Win64OpenSSL-1_[^"]+)"' -InputObject $openssl_download_page
          $openssl_latest_link = $openssl_download_link.Matches[0].Groups[1].Value
          $openssl_latest_url = "https://slproweb.com/download/" + $openssl_latest_link
          Write-Host "Using OpenSSL from $openssl_latest_url"
          (New-Object Net.WebClient).DownloadFile($openssl_latest_url, $openssl_latest_link)
          Start-Process $openssl_latest_link -ArgumentList "/silent /verysilent /sp- /suppressmsgboxes" -Wait
          Write-Host "Done installing OpenSSL"
          Write-Host "Downloading SQLite ODBC Driver x64..."
          $exePath = "$($env:TEMP)\sqliteodbc_w64.exe"
          (New-Object Net.WebClient).DownloadFile('http://www.ch-werner.de/sqliteodbc/sqliteodbc_w64.exe', $exePath)
          Write-Host "Installing..."
          cmd /c start /wait $exePath /S
          Write-Host "Done installing SQLite ODBC Driver x64"

      - name: Build (windows amd64)
        run: |
          cd build
          cmake .. -DBUILD_SHARED_LIBS=FALSE -DCMAKE_BUILD_TYPE=RelWithDebInfo
          if ($lastexitcode -ne 0) { exit $lastexitcode }
          cmake --build . --target package --config RelWithDebInfo --parallel
          if ($lastexitcode -ne 0) { exit $lastexitcode }

      - name: Upload windows build tree
        uses: actions/upload-artifact@v4
        with:
          name: build-tree-windows-amd64
          path: |
            build/
            build-bin/

      - name: Upload windows packages
        uses: actions/upload-artifact@v4
        with:
          name: rzu-windows-amd64
          path: build/*.zip

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------

  test-linux-amd64:
    runs-on: ubuntu-latest
    needs: build-linux-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            unixodbc-dev \
            libsqliteodbc \
            libssl-dev \
            libreadline-dev \
            gdb \
            valgrind

      - name: Download amd64 build tree
        uses: actions/download-artifact@v4
        with:
          name: build-tree-linux-amd64
          path: .

      - name: Restore binary permissions
        run: chmod -R +x build-bin/

      - name: Test (amd64)
        run: |
          ulimit -c unlimited
          sudo sh -c 'echo "core.%e.%p.%s.%t" > /proc/sys/kernel/core_pattern'
          cd build
          set +e
          set -x
          LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu/odbc valgrind --leak-check=full --trace-children=yes ctest -VV
          RESULT=$?
          for i in $(find ./ -maxdepth 1 -name 'core*' -print); do
            echo "Core $i" && file "$i" &&
            gdb "$(file "$i" | sed -r "s/.*from '([^ ']+)[ '].*/\1/")" "$i" -ex "thread apply all bt" -ex "set pagination 0" -batch
          done
          zip -r test_logs.zip core* log traffic_log
          exit $RESULT

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_logs_linux_amd64
          path: build/test_logs.zip

  test-linux-arm64:
    runs-on: ubuntu-24.04-arm
    needs: build-linux-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            cmake \
            unixodbc-dev \
            libsqliteodbc \
            libssl-dev \
            libreadline-dev \
            gdb \
            valgrind

      - name: Download arm64 build tree
        uses: actions/download-artifact@v4
        with:
          name: build-tree-linux-arm64
          path: .

      - name: Restore binary permissions
        run: chmod -R +x build-bin/

      - name: Test (arm64)
        run: |
          cd build
          set +e
          set -x
          LD_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu/odbc valgrind --leak-check=full --trace-children=yes ctest -VV
          RESULT=$?
          for i in $(find ./ -maxdepth 1 -name 'core*' -print); do
            echo "Core $i" && file "$i" &&
            gdb "$(file "$i" | sed -r "s/.*from '([^ ']+)[ '].*/\1/")" "$i" -ex "thread apply all bt" -ex "set pagination 0" -batch
          done
          zip -r test_logs.zip core* log traffic_log
          exit $RESULT

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_logs_linux_arm64
          path: build/test_logs.zip

  test-windows-amd64:
    runs-on: windows-latest
    needs: build-windows-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install SQLite ODBC Driver
        run: |
          $exePath = "$($env:TEMP)\sqliteodbc_w64.exe"
          (New-Object Net.WebClient).DownloadFile('http://www.ch-werner.de/sqliteodbc/sqliteodbc_w64.exe', $exePath)
          cmd /c start /wait $exePath /S
          Write-Host "Done installing SQLite ODBC Driver x64"

      - name: Download windows build tree
        uses: actions/download-artifact@v4
        with:
          name: build-tree-windows-amd64
          path: .

      - name: Test (windows amd64)
        run: |
          cd build
          ctest -VV -C RelWithDebInfo
          $test_result = $lastexitcode
          echo "Compressing test logs"
          7z a test_logs.zip crashdump.dmp log traffic_log
          exit $test_result

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_logs_windows_amd64
          path: build/test_logs.zip

  # ---------------------------------------------------------------------------
  # Publish (tags only)
  # ---------------------------------------------------------------------------

  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - test-linux-amd64
      - test-linux-arm64
      - test-windows-amd64
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
